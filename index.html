<!DOCTYPE html>
<html lang="zh-MO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳門氣象局 現時生效天氣警告</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
        }
        body {
            background-color: #0f1118;
            color: #e0e4f0;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            background-color: #1c2233;
            border-radius: 12px 12px 0 0;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .warn-triangle {
            width: 40px;
            height: 40px;
            background: #f8cc32;
            clip-path: polygon(50% 0, 0 100%, 100% 100%);
            position: relative;
        }
        .warn-triangle::after {
            content: "!";
            color: #000;
            font-weight: bold;
            font-size: 24px;
            position: absolute;
            top: 4px;
            left: 50%;
            transform: translateX(-50%);
        }
        h1 {
            font-size: 36px;
            font-weight: 500;
            color: #d1d9eb;
        }
        .update-time {
            font-size: 32px;
            color: #b0b8cc;
        }
        .warning-list {
            background-color: #24262c;
            border-radius: 0 0 12px 12px;
            overflow: hidden;
        }
        .warning-card {
            display: flex;
            border-left: 8px solid;
            padding: 24px;
            gap: 20px;
            align-items: center;
            border-bottom: 1px solid #333640;
        }
        .warning-card:last-child {
            border-bottom: none;
        }
        .warn-icon {
            font-size: 60px;
            width: 70px;
            text-align: center;
        }
        .warn-text-area {
            flex-grow: 1;
        }
        .warn-name {
            font-size: 48px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .warn-issue-time {
            font-size: 30px;
            color: #c9c9c9;
        }
        .warn-duration {
            font-size: 42px;
            color: #f2d060;
            white-space: nowrap;
        }
        /* Warning color mapping SMG standard */
        .rain-yellow { border-left-color: #e69020; color: #f2d060; }
        .rain-red { border-left-color: #d82222; color: #ff6666; }
        .typhoon { border-left-color: #2088e6; color: #70b8ff; }
        .monsoon { border-left-color: #20b860; color: #60e090; }
        .thunderstorm { border-left-color: #9944dd; color: #c890ff; }
        .stormsurge { border-left-color: #dd7722; color: #ffb060; }
        .empty-state {
            padding: 60px 20px;
            text-align: center;
            font-size: 28px;
            color: #888;
        }
        .loading {
            padding: 60px;
            text-align: center;
            font-size: 28px;
            color: #aaa;
        }
        .footer-note {
            margin-top: 24px;
            color: #777;
            font-size: 18px;
            text-align: center;
        }
        @media (max-width: 900px) {
            header { flex-direction: column; align-items: flex-start; gap: 12px; }
            h1 { font-size: 28px; }
            .update-time { font-size: 24px; }
            .warning-card { flex-direction: column; align-items: flex-start; }
            .warn-name { font-size: 32px; }
            .warn-duration { font-size: 28px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <div class="warn-triangle"></div>
            <h1>現時生效警告</h1>
        </div>
        <div class="update-time" id="globalUpdateTime">更新 --:--</div>
    </header>
    <div class="warning-list" id="warningContainer">
        <div class="loading">正在讀取澳門氣象局天氣警告資料...</div>
    </div>
    <div class="footer-note">
        數據來源：澳門地球物理暨氣象局 SMG XML 開放數據 | 自動每5分鐘重新整理
    </div>

    <script>
        // SMG XML Endpoints list
        const API_ENDPOINTS = [
            { name: 'rainstorm', url: 'https://xml.smg.gov.mo/c_rainstorm.xml' },
            { name: 'typhoon', url: 'https://xml.smg.gov.mo/c_typhoon.xml' },
            { name: 'monsoon', url: 'https://xml.smg.gov.mo/c_monsoon.xml' },
            { name: 'thunderstorm', url: 'https://xml.smg.gov.mo/c_thunderstorm.xml' },
            { name: 'stormsurge', url: 'https://xml.smg.gov.mo/c_stormsurge.xml' }
        ];

        // Warning icon & color mapping
        const WARN_CONFIG = {
            rainstorm_yellow: { icon: "🌧️", cls: "rain-yellow", name: "黃色暴雨警告信號" },
            rainstorm_red: { icon: "🌧️", cls: "rain-red", name: "紅色暴雨警告信號" },
            typhoon: { icon: "🌀", cls: "typhoon", name: "熱帶氣旋警告信號" },
            monsoon: { icon: "💨", cls: "monsoon", name: "季風暴雨警告信號" },
            thunderstorm: { icon: "⛈️", cls: "thunderstorm", name: "雷暴警告信號" },
            stormsurge: { icon: "🌊", cls: "stormsurge", name: "風暴潮警告信號" }
        };

        // CORS Proxy to bypass cross-origin restriction
        async function fetchProxy(targetUrl) {
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
            const response = await fetch(proxyUrl);
            return response;
        }

        // Parse XML text to DOM
        function parseXML(xmlStr) {
            const parser = new DOMParser();
            return parser.parseFromString(xmlStr, "text/xml");
        }

        // Calculate time difference (HH小時 MM分鐘)
        function getTimeDiff(issueDateStr, nowTs) {
            // issueDateStr format: "6月18日 15:40"
            const [datePart, timePart] = issueDateStr.split(" ");
            const [month, day] = datePart.replace("日", "").split("月").map(Number);
            const [hour, min] = timePart.split(":").map(Number);
            const issueDate = new Date();
            issueDate.setMonth(month - 1);
            issueDate.setDate(day);
            issueDate.setHours(hour, min, 0, 0);
            const diffMs = nowTs - issueDate.getTime();
            const totalMin = Math.floor(diffMs / 60000);
            const h = Math.floor(totalMin / 60);
            const m = totalMin % 60;
            if (h > 0) return `已生效 ${h} 小時 ${m} 分鐘`;
            return `已生效 ${m} 分鐘`;
        }

        // Fetch single warning XML via proxy
        async function fetchWarning(url) {
            const res = await fetchProxy(url);
            const xmlText = await res.text();
            return parseXML(xmlText);
        }

        // Render all warnings to page
        async function renderAllWarnings() {
            const container = document.getElementById("warningContainer");
            container.innerHTML = `<div class="loading">載入中...</div>`;
            const now = new Date();
            const nowTs = now.getTime();
            const globalUpdate = document.getElementById("globalUpdateTime");
            globalUpdate.textContent = `更新 ${now.getHours().toString().padStart(2, "0")}:${now.getMinutes().toString().padStart(2, "0")}`;
            const activeWarnings = [];

            try {
                // Parallel fetch all 5 XML
                const fetchPromises = API_ENDPOINTS.map(item => fetchWarning(item.url));
                const xmlDocs = await Promise.all(fetchPromises);

                // Process each XML result
                for (let i = 0; i < API_ENDPOINTS.length; i++) {
                    const type = API_ENDPOINTS[i].name;
                    const xml = xmlDocs[i];
                    const root = xml.documentElement;
                    const isActive = root.querySelector("active")?.textContent === "1";
                    if (!isActive) continue;

                    // Extract issue time
                    const issueDate = root.querySelector("issuedate").textContent;
                    const issueTime = root.querySelector("issuetime").textContent;
                    const fullIssueStr = `${issueDate} ${issueTime}`;
                    const durationText = getTimeDiff(fullIssueStr, nowTs);

                    // Match warning style config
                    let warnKey;
                    if (type === "rainstorm") {
                        const level = root.querySelector("level").textContent;
                        warnKey = level === "yellow" ? "rainstorm_yellow" : "rainstorm_red";
                    } else {
                        warnKey = type;
                    }
                    const cfg = WARN_CONFIG[warnKey];
                    activeWarnings.push({
                        cfg,
                        issueStr: fullIssueStr,
                        duration: durationText
                    });
                }

                // Render HTML
                if (activeWarnings.length === 0) {
                    container.innerHTML = `<div class="empty-state">現時沒有任何生效天氣警告</div>`;
                    return;
                }
                let html = "";
                activeWarnings.forEach(w => {
                    html += `
                    <div class="warning-card ${w.cfg.cls}">
                        <div class="warn-icon">${w.cfg.icon}</div>
                        <div class="warn-text-area">
                            <div class="warn-name">${w.cfg.name}</div>
                            <div class="warn-issue-time">發出：${w.issueStr}</div>
                        </div>
                        <div class="warn-duration">${w.duration}</div>
                    </div>
                    `;
                });
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = `<div class="empty-state">載入警告數據失敗，請稍後重試</div>`;
                console.error("Fetch SMG XML Error:", err);
            }
        }

        // Initial load + auto refresh every 5 mins (300000ms)
        renderAllWarnings();
        setInterval(renderAllWarnings, 300000);
    </script>
</body>
</html>
